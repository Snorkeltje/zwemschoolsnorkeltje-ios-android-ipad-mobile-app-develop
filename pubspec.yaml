name: zwemschool_snorkeltje
description: Zwemschool Snorkeltje - Swimming School Mobile App for iOS, Android & iPad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.0.0

  # Local Storage (Offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Authentication
  supabase_flutter: ^2.3.0

  # Payments
  flutter_stripe: ^10.1.1

  # Push Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^16.3.0

  # UI Components
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # Calendar & Date
  table_calendar: ^3.0.9
  intl: ^0.19.0

  # Charts
  fl_chart: ^0.66.2

  # Camera & Images
  image_picker: ^1.0.7

  # PDF
  printing: ^5.12.0
  pdf: ^3.10.7

  # Connectivity
  connectivity_plus: ^5.0.2

  # Permissions
  permission_handler: ^11.2.0

  # QR Code
  qr_flutter: ^4.1.0

  # Chat
  dash_chat_2: ^0.0.21

  # Misc
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.1
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.0.0
  hive_generator: ^2.0.1
  flutter_lints: ^3.0.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
