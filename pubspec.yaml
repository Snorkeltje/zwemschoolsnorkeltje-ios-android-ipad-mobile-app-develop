name: zwemschool_snorkeltje
description: Zwemschool Snorkeltje - Swimming School Mobile App for iOS, Android & iPad
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.3

  # Fonts
  google_fonts: ^6.2.1

  # SVG Support
  flutter_svg: ^2.0.10+1

  # Date & Calendar
  intl: ^0.19.0
  table_calendar: ^3.1.2

  # Shimmer loading effect
  shimmer: ^3.0.0

  # URL launcher
  url_launcher: ^6.3.1

  # Image picker
  image_picker: ^1.1.2

  # Cached network image
  cached_network_image: ^3.4.1

  # Connectivity
  connectivity_plus: ^6.1.4

  # UUID
  uuid: ^4.5.1

  # Local storage (simple)
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
